<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Grid Builder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }

  #app { display: flex; flex-direction: column; height: 100vh; }

  /* Top toolbar */
  #toolbar {
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    padding: 10px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    flex-shrink: 0;
  }
  #toolbar label { font-size: 12px; color: #aaa; }
  #toolbar .field { display: flex; flex-direction: column; gap: 3px; }
  #toolbar input[type=number], #toolbar input[type=text] {
    background: #0d1b2a;
    border: 1px solid #0f3460;
    color: #e0e0e0;
    border-radius: 4px;
    padding: 4px 8px;
    width: 70px;
    font-size: 13px;
  }
  #toolbar input[type=text].wide { width: 200px; }
  #toolbar button {
    background: #0f3460;
    color: #e0e0e0;
    border: none;
    border-radius: 4px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
  }
  #toolbar button:hover { background: #1a5276; }
  #toolbar button.active { background: #2874a6; }
  .sep { width: 1px; background: #0f3460; align-self: stretch; }

  /* Main area */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* Left sidebar */
  #sidebar {
    width: 220px;
    background: #16213e;
    border-right: 1px solid #0f3460;
    padding: 12px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  #sidebar h3 { font-size: 13px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .key-entry { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .key-swatch { width: 20px; height: 20px; border-radius: 3px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2); }
  .key-entry input[type=text] {
    background: #0d1b2a;
    border: 1px solid #0f3460;
    color: #e0e0e0;
    border-radius: 4px;
    padding: 3px 6px;
    font-size: 12px;
    flex: 1;
    min-width: 0;
  }
  .key-entry button {
    background: none;
    border: none;
    color: #666;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px;
  }
  .key-entry button:hover { color: #e74c3c; }
  #add-key-btn {
    width: 100%;
    background: #0f3460;
    color: #e0e0e0;
    border: none;
    border-radius: 4px;
    padding: 5px;
    cursor: pointer;
    font-size: 12px;
    margin-top: 4px;
  }
  #add-key-btn:hover { background: #1a5276; }

  /* Canvas area */
  #canvas-area {
    flex: 1;
    overflow: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  #caption-text {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 12px;
    font-style: italic;
    min-height: 1em;
  }

  #grid-wrapper { position: relative; }

  #grid-table {
    border-collapse: collapse;
    user-select: none;
  }

  #grid-table th {
    background: #16213e;
    color: #ccc;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 6px;
    text-align: center;
    white-space: nowrap;
    border: 1px solid #0f3460;
  }
  #grid-table th.row-header {
    background: #0d1b2a;
    color: #888;
    min-width: 32px;
  }

  #grid-table td {
    cursor: pointer;
    position: relative;
    transition: filter 0.1s;
  }
  #grid-table td:hover { filter: brightness(1.25); }
  #grid-table td.no-lines { border: none; }
  #grid-table td.with-lines { border: 1px solid #333; }
  #grid-table td.selected { outline: 2px solid #58a6ff; outline-offset: -2px; z-index: 1; }
  #grid-table th.with-lines { border: 1px solid #0f3460; }
  #grid-table th.no-lines { border: none; }

  .cell-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: rgba(0,0,0,0.7);
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 2px;
  }

  /* Color picker popup */
  #color-popup {
    position: fixed;
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 8px;
    padding: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    z-index: 1000;
    display: none;
    flex-direction: column;
    gap: 8px;
    min-width: 180px;
  }
  #color-popup.visible { display: flex; }
  .popup-swatches { display: flex; gap: 6px; flex-wrap: wrap; }
  .popup-swatch {
    width: 32px;
    height: 32px;
    border-radius: 5px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.1s, transform 0.1s;
  }
  .popup-swatch:hover { border-color: #fff; transform: scale(1.1); }
  .popup-swatch.selected { border-color: #fff; }
  .popup-custom { display: flex; align-items: center; gap: 6px; }
  .popup-custom label { font-size: 11px; color: #aaa; }
  #custom-color-input { width: 36px; height: 24px; border: none; cursor: pointer; background: none; padding: 0; }
  .popup-text-row { display: flex; gap: 4px; }
  #popup-text-input {
    background: #0d1b2a;
    border: 1px solid #0f3460;
    color: #e0e0e0;
    border-radius: 4px;
    padding: 3px 6px;
    font-size: 12px;
    flex: 1;
  }
  .popup-actions { display: flex; gap: 6px; }
  .popup-actions button {
    flex: 1;
    background: #0f3460;
    color: #e0e0e0;
    border: none;
    border-radius: 4px;
    padding: 5px;
    cursor: pointer;
    font-size: 12px;
  }
  .popup-actions button:hover { background: #1a5276; }
  .popup-actions button.clear-btn { background: #3d1f1f; }
  .popup-actions button.clear-btn:hover { background: #5d2f2f; }
  #popup-title { font-size: 11px; color: #888; border-bottom: 1px solid #0f3460; padding-bottom: 6px; }

  /* Diffuse controls */
  .diffuse-row { display: flex; align-items: center; gap: 8px; }
  .diffuse-row label { font-size: 12px; color: #aaa; }
  #diffuse-level {
    background: #0d1b2a;
    border: 1px solid #0f3460;
    color: #e0e0e0;
    border-radius: 4px;
    padding: 4px 8px;
    width: 55px;
    font-size: 13px;
  }

  .export-btn {
    background: #1a6b3a !important;
  }
  .export-btn:hover { background: #218f4e !important; }
</style>
</head>
<body>
<div id="app">
  <!-- Toolbar -->
  <div id="toolbar">
    <div class="field">
      <label>Rows</label>
      <input type="number" id="rows-input" value="5" min="1" max="50">
    </div>
    <div class="field">
      <label>Columns</label>
      <input type="number" id="cols-input" value="4" min="1" max="30">
    </div>
    <div class="field">
      <label>Cell Width (px)</label>
      <input type="number" id="cell-w-input" value="80" min="20" max="300">
    </div>
    <div class="field">
      <label>Cell Height (px)</label>
      <input type="number" id="cell-h-input" value="40" min="16" max="200">
    </div>
    <button id="apply-btn">Apply Grid</button>
    <div class="sep"></div>
    <div class="field">
      <label>Caption</label>
      <input type="text" id="caption-input" class="wide" placeholder="Enter caption…">
    </div>
    <div class="sep"></div>
    <div class="diffuse-row">
      <label>Diffuse</label>
      <input type="number" id="diffuse-level" value="0" min="0" max="8">
    </div>
    <button id="diffuse-btn">Apply Diffuse</button>
    <div class="sep"></div>
    <button id="lines-btn" class="active">Lines: ON</button>
    <div class="sep"></div>
    <button id="export-btn" class="export-btn">Export Image</button>
  </div>

  <div id="main">
    <!-- Key sidebar -->
    <div id="sidebar">
      <h3>Color Key</h3>
      <div id="key-list"></div>
      <button id="add-key-btn">+ Add Key Entry</button>
    </div>

    <!-- Grid canvas area -->
    <div id="canvas-area">
      <div id="caption-text"></div>
      <div id="grid-wrapper">
        <table id="grid-table"></table>
      </div>
    </div>
  </div>
</div>

<!-- Color picker popup -->
<div id="color-popup">
  <div id="popup-title">Pick color</div>
  <div class="popup-swatches" id="popup-swatches"></div>
  <div class="popup-custom">
    <label>Custom:</label>
    <input type="color" id="custom-color-input" value="#ffffff">
  </div>
  <div class="popup-text-row">
    <input type="text" id="popup-text-input" placeholder="Label text…">
  </div>
  <div class="popup-actions">
    <button id="popup-apply-btn">Apply</button>
    <button id="popup-clear-btn" class="clear-btn">Clear</button>
  </div>
</div>

<script>
const DEFAULT_COLORS = [
  { color: '#e74c3c', label: 'Red' },
  { color: '#f1c40f', label: 'Yellow' },
  { color: '#95a5a6', label: 'Gray' },
  { color: '#2ecc71', label: 'Green' },
];

let state = {
  rows: 5,
  cols: 4,
  cellW: 80,
  cellH: 40,
  caption: '',
  showLines: true,
  diffuseLevel: 0,
  colNames: [],
  // cells[row][col] = { color, text }
  cells: [],
  // base cells before diffuse (for re-diffusing)
  baseCells: [],
  keyEntries: [
    { color: '#e74c3c', label: 'Red' },
    { color: '#f1c40f', label: 'Yellow' },
    { color: '#95a5a6', label: 'Gray' },
    { color: '#2ecc71', label: 'Green' },
  ],
};

let activeCell = null; // { r, c } — the cell the popup is anchored to
let selectedColor = null;

// Multi-select state
let selection = new Set(); // keys like "r,c"
let lastSingle = null;     // { r, c } — anchor for shift-range

function selKey(r, c) { return `${r},${c}`; }
function selParsed(key) { const [r,c] = key.split(',').map(Number); return {r,c}; }

function setSelected(r, c, on) {
  const k = selKey(r, c);
  if (on) selection.add(k); else selection.delete(k);
  const td = document.querySelector(`td[data-row="${r}"][data-col="${c}"]`);
  if (td) td.classList.toggle('selected', on);
}

function clearSelection() {
  selection.forEach(k => {
    const {r, c} = selParsed(k);
    const td = document.querySelector(`td[data-row="${r}"][data-col="${c}"]`);
    if (td) td.classList.remove('selected');
  });
  selection.clear();
}

function initCells(rows, cols, oldCells, oldBase) {
  const cells = [];
  const base = [];
  for (let r = 0; r < rows; r++) {
    cells.push([]);
    base.push([]);
    for (let c = 0; c < cols; c++) {
      const old = (oldCells[r] || [])[c] || null;
      const oldB = (oldBase[r] || [])[c] || null;
      cells[r].push(old ? { ...old } : { color: null, text: '' });
      base[r].push(oldB ? { ...oldB } : { color: null, text: '' });
    }
  }
  return { cells, base };
}

function initColNames(cols, oldNames) {
  const names = [];
  for (let c = 0; c < cols; c++) {
    names.push(oldNames[c] || `Col ${c + 1}`);
  }
  return names;
}

function buildGrid() {
  selection.clear();
  lastSingle = null;
  const table = document.getElementById('grid-table');
  table.innerHTML = '';

  const lineClass = state.showLines ? 'with-lines' : 'no-lines';

  // Header row
  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');

  // Row number corner
  const corner = document.createElement('th');
  corner.className = `row-header ${lineClass}`;
  corner.textContent = '#';
  hrow.appendChild(corner);

  for (let c = 0; c < state.cols; c++) {
    const th = document.createElement('th');
    th.className = lineClass;
    th.style.minWidth = state.cellW + 'px';
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.value = state.colNames[c];
    inp.style.cssText = 'background:transparent;border:none;color:inherit;font:inherit;text-align:center;width:100%;outline:none;';
    inp.addEventListener('change', e => { state.colNames[c] = e.target.value; });
    th.appendChild(inp);
    hrow.appendChild(th);
  }
  thead.appendChild(hrow);
  table.appendChild(thead);

  // Body
  const tbody = document.createElement('tbody');
  for (let r = 0; r < state.rows; r++) {
    const tr = document.createElement('tr');

    const rh = document.createElement('th');
    rh.className = `row-header ${lineClass}`;
    rh.textContent = r + 1;
    rh.style.fontSize = '11px';
    tr.appendChild(rh);

    for (let c = 0; c < state.cols; c++) {
      const td = document.createElement('td');
      td.className = lineClass;
      td.dataset.row = r;
      td.dataset.col = c;
      td.style.width = state.cellW + 'px';
      td.style.height = state.cellH + 'px';

      const cell = state.cells[r][c];
      if (cell.color) td.style.backgroundColor = cell.color;
      else td.style.backgroundColor = '#0d1b2a';

      const inner = document.createElement('div');
      inner.className = 'cell-inner';
      inner.style.width = state.cellW + 'px';
      inner.style.height = state.cellH + 'px';
      inner.textContent = cell.text || '';
      // auto text color
      if (cell.color) inner.style.color = contrastColor(cell.color);
      td.appendChild(inner);

      td.addEventListener('click', e => {
        e.stopPropagation();
        if (e.ctrlKey || e.metaKey) {
          // Toggle this cell in/out of selection
          const on = !selection.has(selKey(r, c));
          setSelected(r, c, on);
          if (on) lastSingle = { r, c };
          closePopup();
        } else if (e.shiftKey && lastSingle) {
          // Range select from lastSingle to this cell
          clearSelection();
          const r0 = Math.min(lastSingle.r, r), r1 = Math.max(lastSingle.r, r);
          const c0 = Math.min(lastSingle.c, c), c1 = Math.max(lastSingle.c, c);
          for (let rr = r0; rr <= r1; rr++)
            for (let cc = c0; cc <= c1; cc++)
              setSelected(rr, cc, true);
          // Open popup for the range
          openPopup(r, c, td);
        } else {
          // Plain click: clear selection and open popup
          clearSelection();
          lastSingle = { r, c };
          setSelected(r, c, true);
          openPopup(r, c, td);
        }
      });

      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
}

function contrastColor(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const lum = 0.299*r + 0.587*g + 0.114*b;
  return lum > 140 ? 'rgba(0,0,0,0.75)' : 'rgba(255,255,255,0.9)';
}

function updateCellDisplay(r, c) {
  const td = document.querySelector(`td[data-row="${r}"][data-col="${c}"]`);
  if (!td) return;
  const cell = state.cells[r][c];
  td.style.backgroundColor = cell.color || '#0d1b2a';
  const inner = td.querySelector('.cell-inner');
  inner.textContent = cell.text || '';
  inner.style.color = cell.color ? contrastColor(cell.color) : '#555';
}

// Popup
const popup = document.getElementById('color-popup');
const swatchesEl = document.getElementById('popup-swatches');
const customColorInput = document.getElementById('custom-color-input');
const popupTextInput = document.getElementById('popup-text-input');

function buildSwatches() {
  swatchesEl.innerHTML = '';
  DEFAULT_COLORS.forEach(({color, label}) => {
    const s = document.createElement('div');
    s.className = 'popup-swatch';
    s.style.backgroundColor = color;
    s.title = label;
    if (selectedColor === color) s.classList.add('selected');
    s.addEventListener('click', () => {
      selectedColor = color;
      customColorInput.value = color;
      buildSwatches();
    });
    swatchesEl.appendChild(s);
  });
  // Also add key entry colors
  state.keyEntries.forEach(({color, label}) => {
    if (DEFAULT_COLORS.find(d => d.color === color)) return;
    const s = document.createElement('div');
    s.className = 'popup-swatch';
    s.style.backgroundColor = color;
    s.title = label;
    if (selectedColor === color) s.classList.add('selected');
    s.addEventListener('click', () => {
      selectedColor = color;
      customColorInput.value = color;
      buildSwatches();
    });
    swatchesEl.appendChild(s);
  });
}

function openPopup(r, c, td) {
  activeCell = { r, c };
  const cell = state.cells[r][c];
  selectedColor = cell.color;
  customColorInput.value = cell.color || '#ffffff';
  popupTextInput.value = cell.text || '';
  const count = selection.size;
  document.getElementById('popup-title').textContent =
    count > 1 ? `${count} cells selected` : `Row ${r+1}, ${state.colNames[c]}`;
  buildSwatches();

  const rect = td.getBoundingClientRect();
  popup.style.display = 'flex';
  popup.classList.add('visible');

  // Position popup to the right of cell, or left if no room
  let left = rect.right + 8;
  let top = rect.top;
  if (left + 200 > window.innerWidth) left = rect.left - 200;
  if (top + 200 > window.innerHeight) top = window.innerHeight - 210;
  popup.style.left = left + 'px';
  popup.style.top = Math.max(8, top) + 'px';
}

function closePopup() {
  popup.classList.remove('visible');
  popup.style.display = 'none';
  activeCell = null;
}

customColorInput.addEventListener('input', e => {
  selectedColor = e.target.value;
  buildSwatches();
});

document.getElementById('popup-apply-btn').addEventListener('click', () => {
  const targets = selection.size > 0 ? [...selection].map(selParsed) : (activeCell ? [activeCell] : []);
  targets.forEach(({ r, c }) => {
    state.cells[r][c].color = selectedColor;
    state.cells[r][c].text = popupTextInput.value;
    state.baseCells[r][c].color = selectedColor;
    state.baseCells[r][c].text = popupTextInput.value;
    updateCellDisplay(r, c);
  });
  if (state.diffuseLevel > 0) applyDiffuse();
  closePopup();
});

document.getElementById('popup-clear-btn').addEventListener('click', () => {
  const targets = selection.size > 0 ? [...selection].map(selParsed) : (activeCell ? [activeCell] : []);
  targets.forEach(({ r, c }) => {
    state.cells[r][c].color = null;
    state.cells[r][c].text = '';
    state.baseCells[r][c].color = null;
    state.baseCells[r][c].text = '';
    updateCellDisplay(r, c);
  });
  if (state.diffuseLevel > 0) applyDiffuse();
  closePopup();
});

document.addEventListener('click', e => {
  if (popup.classList.contains('visible')) {
    if (!popup.contains(e.target) && !e.target.closest('td')) closePopup();
  } else if (!e.target.closest('td') && !e.ctrlKey && !e.metaKey && !e.shiftKey) {
    clearSelection();
    lastSingle = null;
  }
});

// Diffuse
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r, g, b];
}
function rgbToHex(r, g, b) {
  return '#' + [r,g,b].map(v => Math.round(Math.min(255,Math.max(0,v))).toString(16).padStart(2,'0')).join('');
}

function applyDiffuse() {
  const level = state.diffuseLevel;
  if (level === 0) {
    // Restore base
    for (let r = 0; r < state.rows; r++)
      for (let c = 0; c < state.cols; c++) {
        state.cells[r][c] = { ...state.baseCells[r][c] };
        updateCellDisplay(r, c);
      }
    return;
  }

  // Process each column independently
  for (let c = 0; c < state.cols; c++) {
    // Build color array for this column from base
    const colors = [];
    for (let r = 0; r < state.rows; r++) {
      colors.push(state.baseCells[r][c].color);
    }

    // Apply diffuse iterations: each pass blends adjacent differently-colored cells
    let rgb = colors.map(h => h ? hexToRgb(h) : null);

    for (let iter = 0; iter < level; iter++) {
      const next = rgb.map(v => v ? [...v] : null);
      for (let r = 0; r < state.rows; r++) {
        if (!rgb[r]) continue;
        // blend with neighbors that exist and differ
        const neighbors = [];
        if (r > 0 && rgb[r-1]) neighbors.push(rgb[r-1]);
        if (r < state.rows-1 && rgb[r+1]) neighbors.push(rgb[r+1]);
        if (neighbors.length === 0) continue;
        // weighted average: cell gets weight proportional to (level - iter)
        const w = 1;
        const nw = 0.5 / neighbors.length;
        next[r] = [0,1,2].map(i => (rgb[r][i] * w + neighbors.reduce((s,n) => s + n[i]*nw, 0)) / (w + neighbors.length * nw));
      }
      rgb = next;
    }

    for (let r = 0; r < state.rows; r++) {
      const base = state.baseCells[r][c];
      if (rgb[r]) {
        state.cells[r][c].color = rgbToHex(...rgb[r]);
        state.cells[r][c].text = base.text;
      } else {
        state.cells[r][c].color = null;
        state.cells[r][c].text = base.text;
      }
      updateCellDisplay(r, c);
    }
  }
}

// Lines toggle
let showLines = true;
document.getElementById('lines-btn').addEventListener('click', () => {
  showLines = !showLines;
  state.showLines = showLines;
  const btn = document.getElementById('lines-btn');
  btn.textContent = `Lines: ${showLines ? 'ON' : 'OFF'}`;
  btn.classList.toggle('active', showLines);
  const cls = showLines ? 'with-lines' : 'no-lines';
  const otherCls = showLines ? 'no-lines' : 'with-lines';
  document.querySelectorAll('#grid-table td, #grid-table th').forEach(el => {
    el.classList.remove(otherCls);
    el.classList.add(cls);
  });
});

// Apply grid button
document.getElementById('apply-btn').addEventListener('click', () => {
  state.rows = parseInt(document.getElementById('rows-input').value) || 5;
  state.cols = parseInt(document.getElementById('cols-input').value) || 4;
  state.cellW = parseInt(document.getElementById('cell-w-input').value) || 80;
  state.cellH = parseInt(document.getElementById('cell-h-input').value) || 40;
  state.colNames = initColNames(state.cols, state.colNames);
  const { cells, base } = initCells(state.rows, state.cols, state.cells, state.baseCells);
  state.cells = cells;
  state.baseCells = base;
  buildGrid();
});

// Caption
document.getElementById('caption-input').addEventListener('input', e => {
  state.caption = e.target.value;
  document.getElementById('caption-text').textContent = e.target.value;
});

// Diffuse
document.getElementById('diffuse-btn').addEventListener('click', () => {
  state.diffuseLevel = parseInt(document.getElementById('diffuse-level').value) || 0;
  applyDiffuse();
});

// Key sidebar
function renderKey() {
  const list = document.getElementById('key-list');
  list.innerHTML = '';
  state.keyEntries.forEach((entry, i) => {
    const row = document.createElement('div');
    row.className = 'key-entry';

    const swatch = document.createElement('div');
    swatch.className = 'key-swatch';
    swatch.style.backgroundColor = entry.color;
    swatch.title = 'Click to change color';
    swatch.style.cursor = 'pointer';

    const colorInp = document.createElement('input');
    colorInp.type = 'color';
    colorInp.value = entry.color;
    colorInp.style.cssText = 'position:absolute;opacity:0;width:0;height:0;';
    colorInp.addEventListener('input', e => {
      state.keyEntries[i].color = e.target.value;
      swatch.style.backgroundColor = e.target.value;
    });
    swatch.appendChild(colorInp);
    swatch.addEventListener('click', () => colorInp.click());

    const textInp = document.createElement('input');
    textInp.type = 'text';
    textInp.value = entry.label;
    textInp.placeholder = 'Description…';
    textInp.addEventListener('input', e => { state.keyEntries[i].label = e.target.value; });

    const delBtn = document.createElement('button');
    delBtn.textContent = '×';
    delBtn.addEventListener('click', () => {
      state.keyEntries.splice(i, 1);
      renderKey();
    });

    row.appendChild(swatch);
    row.appendChild(textInp);
    row.appendChild(delBtn);
    list.appendChild(row);
  });
}

document.getElementById('add-key-btn').addEventListener('click', () => {
  state.keyEntries.push({ color: '#ffffff', label: '' });
  renderKey();
});

// Export
document.getElementById('export-btn').addEventListener('click', exportImage);

async function exportImage() {
  // Build an offscreen canvas
  const table = document.getElementById('grid-table');
  const captionEl = document.getElementById('caption-text');
  const keyEntries = state.keyEntries;

  const headerH = state.cellH + 8;
  const captionH = captionEl.textContent ? 30 : 0;
  const keyW = 200;
  const keyLineH = 26;
  const keyH = Math.max(0, keyEntries.length * keyLineH + 32);
  const rowNumW = 36;
  const gridW = rowNumW + state.cols * state.cellW;
  const gridH = headerH + state.rows * state.cellH;
  const totalW = gridW + keyW + 32;
  const totalH = captionH + gridH + 24;

  const canvas = document.createElement('canvas');
  canvas.width = totalW;
  canvas.height = Math.max(totalH, captionH + keyH + 24);
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Caption
  let y = 12;
  if (captionEl.textContent) {
    ctx.fillStyle = '#aaaaaa';
    ctx.font = 'italic 14px system-ui, sans-serif';
    ctx.fillText(captionEl.textContent, 12, y + 14);
    y += captionH;
  }

  // Grid area
  const gx = 12;
  const gy = y;

  // Header bg
  ctx.fillStyle = '#16213e';
  ctx.fillRect(gx, gy, gridW, headerH);

  // Row num header
  ctx.fillStyle = '#0d1b2a';
  ctx.fillRect(gx, gy, rowNumW, headerH);

  // Column headers
  ctx.fillStyle = '#cccccc';
  ctx.font = 'bold 12px system-ui, sans-serif';
  ctx.textAlign = 'center';
  for (let c = 0; c < state.cols; c++) {
    const x = gx + rowNumW + c * state.cellW + state.cellW / 2;
    ctx.fillText(state.colNames[c], x, gy + headerH / 2 + 4, state.cellW - 4);
  }

  // Cells
  for (let r = 0; r < state.rows; r++) {
    const cy2 = gy + headerH + r * state.cellH;

    // Row number
    ctx.fillStyle = '#0d1b2a';
    ctx.fillRect(gx, cy2, rowNumW, state.cellH);
    ctx.fillStyle = '#888888';
    ctx.font = '11px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(String(r + 1), gx + rowNumW / 2, cy2 + state.cellH / 2 + 4);

    for (let c = 0; c < state.cols; c++) {
      const cx = gx + rowNumW + c * state.cellW;
      const cell = state.cells[r][c];
      ctx.fillStyle = cell.color || '#0d1b2a';
      ctx.fillRect(cx, cy2, state.cellW, state.cellH);

      if (cell.text) {
        ctx.fillStyle = cell.color ? contrastColor(cell.color) : '#555555';
        ctx.font = 'bold 11px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(cell.text, cx + state.cellW / 2, cy2 + state.cellH / 2 + 4, state.cellW - 4);
      }
    }
  }

  // Lines
  if (state.showLines) {
    ctx.strokeStyle = '#333333';
    ctx.lineWidth = 1;
    for (let r = 0; r <= state.rows; r++) {
      const ly = gy + headerH + r * state.cellH;
      ctx.beginPath();
      ctx.moveTo(gx + rowNumW, ly);
      ctx.lineTo(gx + gridW, ly);
      ctx.stroke();
    }
    for (let c = 0; c <= state.cols; c++) {
      const lx = gx + rowNumW + c * state.cellW;
      ctx.beginPath();
      ctx.moveTo(lx, gy + headerH);
      ctx.lineTo(lx, gy + headerH + state.rows * state.cellH);
      ctx.stroke();
    }
    // Outer border
    ctx.strokeStyle = '#0f3460';
    ctx.lineWidth = 1;
    ctx.strokeRect(gx, gy, gridW, headerH + state.rows * state.cellH);
  }

  // Key
  const kx = gx + gridW + 20;
  const ky = gy;
  ctx.fillStyle = '#16213e';
  ctx.fillRect(kx, ky, keyW - 8, Math.max(keyH, 40));
  ctx.fillStyle = '#aaaaaa';
  ctx.font = 'bold 12px system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('KEY', kx + 8, ky + 18);

  keyEntries.forEach((entry, i) => {
    const ey = ky + 32 + i * keyLineH;
    ctx.fillStyle = entry.color;
    ctx.fillRect(kx + 8, ey, 16, 16);
    if (state.showLines) {
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(kx + 8, ey, 16, 16);
    }
    ctx.fillStyle = '#e0e0e0';
    ctx.font = '12px system-ui, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(entry.label, kx + 30, ey + 12, keyW - 42);
  });

  // Download
  const link = document.createElement('a');
  link.download = 'color-grid.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// Init
function init() {
  state.colNames = initColNames(state.cols, []);
  const { cells, base } = initCells(state.rows, state.cols, [], []);
  state.cells = cells;
  state.baseCells = base;
  buildGrid();
  renderKey();
}

init();
</script>
